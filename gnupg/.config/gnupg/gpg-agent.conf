# Enable ssh
enable-ssh-support

#config pinentry-program
pinentry-program /usr/bin/pinentry-curses
allow-loopback-pinentry
pinentry-timeout 60
no-allow-external-cache
ssh-fingerprint-digest sha256
allow-preset-passphrase

# Set caches
#default-cache-ttl-ssh 60480000
default-cache-ttl-ssh 1
max-cache-ttl-ssh 1
max-cache-ttl 1
default-cache-ttl 1

# Set default screen
display :0
