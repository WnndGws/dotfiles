# Automatically generated by espanso migration tool
# Original file: default.yml

matches:
  - trigger: ":espanso"
    replace: Hi there!

  - trigger: mcmid
    replace: MyCricket matchID

  - trigger: ":tu"
    replace: "&#x1F44d;"

  - trigger: ":today"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%m/%d/%Y"

  - trigger: ":shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: echo Hello from your shell

  - trigger: ":h"
    markdown: "{{clipboard}}"
    vars:
      - name: clipboard
        type: clipboard

  - trigger: ":ip"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "curl 'https://api.ipify.org'"
          shell: wsl

  - trigger: cfb
    replace: "{{output}}"
    vars:
      - name: output
        type: random
        params:
          choices:
            - "Cheers,\nFrogBox Support\nfrogbox.live"

  - trigger: ":booking"
    replace: |
      https://outlook.office365.com/owa/calendar/FrogBox@SportradarAG.onmicrosoft.com/bookings/

  - trigger: ":bluescreen"
    replace: "We are currently seeing a bluescreen. This usually means either the camera is off, or there's a loose HDMI cable somewhere"

  - trigger: ":longblue"
    replace: "We are seeing a blue screen on your feed. Can you please check the following\n1) The camera is on and plugged into the external battery\n2) The external battery is on\n3) The HDMI chain goes as follows\n  Camera -> Repeater Input\n  Repeater Output -> Long HDMI -> Encoder\nYou may need to unplug and re-plug some of the cables to ensure they're sitting tightly.\n"

  - trigger: ":lg"
    replace: "{{output}}"
    vars:
      - name: output
        type: random
        params:
          choices:
            - Everything looks good on this side $|$ 👍
            - Vision looks good on this side $|$ 👍
            - Vision looking good on this side $|$ 👍
            - Vision looks great on this side $|$ 👍
            - Vision looking great on this side $|$ 👍
            - Looks great $|$ 👍
            - Looks good $|$ 👍

  - trigger: ":longgood"
    replace: |
      Everything looks good on this end 👍.
      Youtube will go live 10mins before the game's start time in MyCricket, and the graphics will trigger as soon as you click on "Players and Umpires walking out" in the app.
      Please make sure the app on which you are scoring has internet connection so that the graphics can update in real-time.
      Thanks and enjoy!

  - trigger: ":restart"
    replace: "Can you please restart your encoder, then let us know when you have a solid blue 4G light on the encoder again"

  - trigger: ":offline"
    replace: "We cant see your encoder online at the moment, do you have a solid blue 4G light?\n\nIf it is can you give the encoder a quick restart please?"

  - trigger: ":notcharging"
    replace: Can you please check your encoder is connected to the external battery and the battery is on. The battery symbol on the encoder should be either red or green to indicate it is charging

  - trigger: ":nodata"
    replace: Are you able to double check your sim has data on it? You will need ~1gb per hour to stream

  - trigger: ":useviewer"
    replace: "The easiest way to check the video is to unplug the HDMI cable from the encoder and temporarily plug it into the viewer. Then when you have a picture on the viewer, unplug the HDMI from the viewer and back into the encoder."

  - trigger: ":thanks"
    replace: "Thanks, just let us know when you have a solid blue 4G light on your encoder"

  - trigger: ":tx"
    replace: "Can you please confirm the TX number on the side of the encoder? It will be fluctuating, but should not drop below 800 at any point."

  - trigger: ":mc"
    replace: "https://matchcentre.aus.frogbox.live/match/01"

  - trigger: ":setup"
    replace: "Hi, just checking if you're still planning on streaming on FrogBox today and how the setup is going?"

  - trigger: ":matchesadded"
    replace: |
      Thank you for your match request submission.
      Your match(es) have been added to our internal database and will be set up for FrogBox video.

  - trigger: ":whatsapp"
    replace: "Hi,\n\nWynand from FrogBox here. As mentioned, I am creating this group for your FrogBox streaming. We can use this group to troubleshoot issues if they arise throughout match days. Please notify us on this chat once you have turned the encoder on so we can check the vision.\n\nFeel free to add anyone else to this group if there's a need. You will see our support staff added to the group throughout the season.\n\n The WhatsApp chat is only an official support channel on Match Days, if you have any questions outside of that time, please submit a ticket to guarantee a response. Link here - https://frogbox.freshdesk.com/support/tickets/new\n\nCheers!"

  - trigger: ":sr"
    replace: K9jd2$1Ru$&J9

  - trigger: ":charging"
    replace: Can you just make sure you have this LED lit up to indicate your encoder is charging

  - trigger: ":saveandexit"
    replace: "Can you please ask your scorer to save and exit at the end of this over, then continue scoring as per usual"

  - trigger: ":signal"
    replace: |
      So with these encoders theres a few tips

      1) Make sure the antennas are on the correct port (theyre labelled, also best to have both on even if not using WiFi)
      2) Have the encoder as far off the ground as reasonable (ie. on a table or chair is fine)
      3) Have as little as possible between the encoders and the sky (ie. an umbrella is fine, or next to a window is better than at the back of the bar etc)

  - trigger: ":sim"
    replace: "The sim tray is super temperamental, so you might need to take the sim card out, put it in the slot, face the gold part upwards (it should just sit in the slot), turn the encoder 'upside down' and just geeeeeently slide the tray in"

  - trigger: fb
    replace: FrogBox
    word: true

  - trigger: fbc
    replace: FrogBox Controller
    word: true

  - trigger: mlive
    replace: MLive
    word: true

  - trigger: yt
    replace: YouTube
    word: true

  - trigger: mc
    replace: MyCricket
    word: true

  - trigger: wa
    replace: WhatsApp
    word: true

  - trigger: ":entity"
    replace: "https://mycricket.cricket.com.au/common/pages/public/rv/upcomingmatches.aspx?entityid="

  - trigger: ":match"
    replace: "https://mycricket.cricket.com.au/common/pages/public/rv/match.aspx?matchID="
